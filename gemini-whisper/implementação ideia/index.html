<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Recorder</title>
    <style>
      :root {
        --bg-color: #0f172a;
        --text-color: #e2e8f0;
        --card-bg: #1e293b;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --danger: #ef4444;
      }

      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }

      /* Utilities */
      .btn {
        padding: 0.5rem 1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        border: none;
        cursor: pointer;
        transition: background-color 0.2s;
        font-size: 0.875rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }
      .btn-primary { background-color: var(--accent); color: white; }
      .btn-primary:hover { background-color: var(--accent-hover); }
      .btn-danger { background-color: var(--danger); color: white; }
      .btn-secondary { background-color: var(--card-bg); color: var(--text-color); border: 1px solid #475569; }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 1rem;
        width: 100%;
        box-sizing: border-box;
        flex: 1;
        display: flex;
        gap: 1.5rem;
        overflow: hidden;
      }

      .panel {
        background: var(--card-bg);
        border-radius: 0.75rem;
        border: 1px solid #334155;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .panel-header {
        padding: 1rem;
        border-bottom: 1px solid #334155;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(0,0,0,0.2);
        font-weight: 600;
      }

      .panel-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }

      /* Left Side: Transcript */
      .transcript-item {
        margin-bottom: 0.75rem;
        line-height: 1.6;
        color: #cbd5e1;
      }
      .transcript-item.current {
        color: #fff;
        font-weight: 500;
      }

      /* Right Side: Timeline */
      .timeline-card {
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        overflow: hidden;
      }
      .timeline-img {
        width: 100%;
        height: auto;
        display: block;
        border-bottom: 1px solid #334155;
      }
      .timeline-info {
        padding: 0.75rem;
      }
      .timeline-time {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-bottom: 0.25rem;
        font-family: monospace;
      }
      .timeline-context {
        font-size: 0.875rem;
        color: #e2e8f0;
        font-style: italic;
        border-left: 2px solid var(--accent);
        padding-left: 0.5rem;
      }

      header {
        padding: 1rem;
        border-bottom: 1px solid #334155;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #0f172a;
      }
      
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background-color: #ef4444;
        animation: pulse 1.5s infinite;
        display: inline-block;
        margin-right: 0.5rem;
      }
      
      @keyframes pulse {
        0% { opacity: 1; }
        50% { opacity: 0.5; }
        100% { opacity: 1; }
      }

      .hidden-video {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }
    </style>
    <script type="module" src="/index.tsx"></script>
